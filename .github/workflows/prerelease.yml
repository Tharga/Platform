name: Pre-release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm pre-release publish'
        required: true
        default: 'no'

env:
  MAJOR_MINOR: '2.0'

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master' && github.event.inputs.confirm == 'yes'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Compute pre-release version
        id: version
        run: |
          LATEST_RELEASE=$(git tag -l "${MAJOR_MINOR}.*" --sort=-v:refname \
            | grep -E "^${MAJOR_MINOR}\.[0-9]+$" \
            | head -1)

          if [ -z "$LATEST_RELEASE" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST_RELEASE" | sed "s/${MAJOR_MINOR}\.\([0-9]*\)/\1/")
            PATCH=$((PATCH + 1))
          fi

          PRE_BASE="${MAJOR_MINOR}.${PATCH}-pre"

          LATEST_PRE=$(git tag -l "${PRE_BASE}.*" --sort=-v:refname | head -1)

          if [ -z "$LATEST_PRE" ]; then
            COUNTER=1
          else
            COUNTER=$(echo "$LATEST_PRE" | sed "s/.*-pre\.\([0-9]*\)/\1/")
            COUNTER=$((COUNTER + 1))
          fi

          VERSION="${PRE_BASE}.${COUNTER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed pre-release version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack Tharga.Team/Tharga.Team.csproj -c Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack Tharga.Team.Blazor/Tharga.Team.Blazor.csproj -c Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack Tharga.Team.MongoDB/Tharga.Team.MongoDB.csproj -c Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack Tharga.Team.Service/Tharga.Team.Service.csproj -c Release --no-build -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }} (pre-release)" \
            --notes "Pre-release from \`${{ github.ref_name }}\` branch." \
            --prerelease \
            ./artifacts/*.nupkg
