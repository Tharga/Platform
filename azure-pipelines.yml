trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  BQC.ForceNewBaseline: false
  majorMinor: '2.0'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build and Test

    steps:
    - checkout: self

    - template: buildnumber.yml
      parameters:
        majorMinor: ${{ variables.majorMinor }}

    - task: UseDotNet@2
      displayName: 'Use .NET 10'
      inputs:
        version: 10.0.x
        includePreviewVersions: false

    - task: NuGetToolInstaller@1

    - task: DotNetCoreCLI@2
      displayName: 'Restore nuget packages'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '-c Release --no-restore /p:Version=$(Build.BuildNumber)'
        versioningScheme: 'byBuildNumber'

    - script: |
        if exist "$(Build.ArtifactStagingDirectory)\*.nupkg" del /q "$(Build.ArtifactStagingDirectory)\*.nupkg"
      displayName: 'Clean artifact staging directory'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Team'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Team.csproj'
        nobuild: true
        configuration: 'Release'
        versioningScheme: 'off'
        buildProperties: 'PackageVersion=$(Build.BuildNumber)'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Team.Blazor'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Team.Blazor.csproj'
        nobuild: true
        configuration: 'Release'
        versioningScheme: 'off'
        buildProperties: 'PackageVersion=$(Build.BuildNumber)'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Team.MongoDB'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Team.MongoDB.csproj'
        nobuild: true
        configuration: 'Release'
        versioningScheme: 'off'
        buildProperties: 'PackageVersion=$(Build.BuildNumber)'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Team.Service'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Team.Service.csproj'
        nobuild: true
        configuration: 'Release'
        versioningScheme: 'off'
        buildProperties: 'PackageVersion=$(Build.BuildNumber)'

    - script: dir "$(Build.ArtifactStagingDirectory)\*.nupkg" /b
      displayName: 'List packed nupkg files'

    - task: DotNetCoreCLI@2
      displayName: 'Push nuget packages locally'
      inputs:
        command: 'push'
        packagesToPush: '$(Build.ArtifactStagingDirectory)/*.symbols.nupkg'
        nuGetFeedType: 'internal'
        publishVstsFeed: 'eda8985f-7491-4ceb-b57f-a6ce8a0c96d4'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

- stage: Release
  displayName: Release
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'master'))
  jobs:

  - job: Release
    displayName: Release

    steps:
    - download: current
      artifact: drop
    - checkout: self
      persistCredentials: true

    - script: |
        echo "Files in workspace:"
        dir "$(Pipeline.Workspace)/drop" /s /b
      displayName: 'List pipeline workspace drop files'

    - task: NuGetCommand@2
      displayName: 'Push nuget packages to nuget.org'
      inputs:
        command: 'push'
        packagesToPush: '$(Pipeline.Workspace)/**/*.symbols.nupkg'
        nuGetFeedType: 'external'
        publishFeedCredentials: 'Nuget.org'

    - script: |
         git tag $(Build.BuildNumber)
         git push origin $(Build.BuildNumber)
      workingDirectory: $(Build.SourcesDirectory)
      displayName: Tag